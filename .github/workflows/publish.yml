name: Build and publish to PyPI

# Build distributions on every push/PR (as a smoke test), and publish them
# to PyPI when a GitHub Release is published. Publishing uses PyPI Trusted
# Publishing (OIDC) so no API token secret is needed -- see README.

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Check tag matches package version
        if: github.event_name == 'release'
        run: |
          pkg_version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          tag="${GITHUB_REF_NAME#v}"
          echo "pyproject version: $pkg_version, release tag: $tag"
          if [ "$pkg_version" != "$tag" ]; then
            echo "::error::Release tag ($tag) does not match project version ($pkg_version). Bump version in pyproject.toml."
            exit 1
          fi

      - name: Build
        run: python -m build

      - name: Check metadata
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish for a published GitHub Release.
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/project/morphoview/
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
